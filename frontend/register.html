<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./style.css" rel="stylesheet"/>
</head>
<body>
    <nav>
        <a href="index.html">home</a>&nbsp
        <a href="login.html">login</a>&nbsp
        <a href="register.html">register</a>
    </nav>
    <h1>enter regestration details</h1>
    <div>
        <form>
            <label for="username">UserName :</label>
            <input type="text" id="username" onchange="usernameChanged(event)" required><br>
            <label for="email">Email :</label>
            <input type="text" id="email" onchange="emailChanged(event)" required><br>
            <label for="age">Age :</label>
            <input type="number" id="age" onchange="ageChanged(event)" required><br>
            <label for="pass">Password :</label>
            <input type="password" id="pass" onchange="passChanged(event)" required><br>
            <label for="repass">Retype Password :</label>
            <input type="password" id="repass" onchange="repassChanged(event)" required><br>
            <button type="button" onclick="saveUser()">register</button>
        </form>
    </div>
    <p>already have an account?<a href="./login.html">login</a></p>
    <script src="register.js"></script>
</body>
</html>
